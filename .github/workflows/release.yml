name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  # Keyless cosign signing: lets the jobs obtain a short-lived
  # Fulcio certificate bound to this workflow's OIDC identity.
  id-token: write

jobs:
  artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # tags + history for `git describe`

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (templ)
        run: make generate

      - name: Cross-build artifacts
        run: make dist
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Blob-sign the published checksums in a SEPARATE job: a
  # Fulcio/Rekor outage then fails (and re-runs) only this job —
  # re-running `artifacts` would re-generate the release notes and
  # clobber any hand-curated body. Downloading SHA256SUMS from the
  # release also means the signature covers exactly the bytes
  # consumers fetch. One blob signature covers every tarball via its
  # checksum (README "Verifying releases").
  sign-checksums:
    name: Sign release checksums
    runs-on: ubuntu-latest
    needs: artifacts
    steps:
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Download published SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" --pattern SHA256SUMS

      - name: Sign SHA256SUMS (keyless)
        # cosign v4 sigstore bundle: ONE file carrying signature,
        # certificate, and transparency-log entry. The v0.8.0
        # acceptance run proved the old --output-signature/
        # --output-certificate flags are ignored under v4's
        # new-bundle-format default (the run failed on an empty
        # bundle path).
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.sigstore.json

      - name: Attach signature bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            SHA256SUMS.sigstore.json \
            --repo "$GITHUB_REPOSITORY" --clobber

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Compute Docker tag (strip leading `v`)
        id: docker_tag
        # The git tag is `vX.Y.Z` (semver convention); the Docker
        # image tag is `X.Y.Z` (Docker tag convention). The binary
        # build still gets the full `vX.Y.Z` via VERSION below so
        # `./blittermib -version` matches the git tag.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/blittermib:${{ steps.docker_tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/blittermib:latest
          build-args: |
            VERSION=${{ github.ref_name }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (keyless, by digest)
        # Tags are mutable pointers — sign the digest, which covers
        # every tag pointing at it (the version tag AND `latest`).
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/blittermib@${{ steps.build.outputs.digest }}"
