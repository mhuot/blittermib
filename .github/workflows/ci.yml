name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsmi
        run: |
          sudo apt-get update
          sudo apt-get install -y libsmi2-dev smitools

      - name: Generate (templ)
        run: make generate

      - name: Check generated and prepared assets are up to date
        run: |
          make prepare-assets
          if ! git diff --exit-code; then
            echo "::error::Generated/prepared files are stale. Run 'make generate' and 'make prepare-assets' and commit the result. Note: the CSS source of truth is prototype/styles.css, not internal/server/assets/styles.css."
            exit 1
          fi

      - name: Verify
        run: make verify

      - name: Build
        run: make build

  cross-build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (templ)
        run: make generate

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: make build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Build Docker image
        run: make docker-build TAG=blittermib:ci

      - name: Smoke-test image tool surface
        run: make docker-smoke TAG=blittermib:ci
