name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsmi
        run: |
          sudo apt-get update
          sudo apt-get install -y libsmi2-dev smitools

      - name: Generate (templ)
        run: make generate

      - name: Verify
        run: make verify

      - name: Build
        run: make build

  cross-build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (templ)
        run: make generate

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: make build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Build Docker image
        run: make docker-build TAG=blittermib:ci

      - name: Smoke-test image tool surface
        run: make docker-smoke TAG=blittermib:ci

  # Lint + render the Helm chart, then install it on a throwaway kind
  # cluster (with the Gateway API CRDs applied) to exercise the
  # httpRoute path end-to-end and confirm the pod reaches Ready. helm
  # and kubectl are preinstalled on ubuntu-latest; kind and the CRDs are
  # fetched at pinned versions, so no new pinned action is introduced.
  chart:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Lint and template chart
        run: |
          make helm-lint
          make helm-template

      - name: Install kind
        run: |
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait 120s

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml

      - name: Install chart (httpRoute + extraMibs paths)
        # Pin image.tag to a published tag so the smoke doesn't depend on
        # Chart.yaml's appVersion matching an already-pushed image.
        # extraMibs.enabled exercises the subPath ConfigMap mount under
        # the default read-only root filesystem (the path that silently
        # ingested nothing with a plain ConfigMap mount).
        run: |
          helm install blittermib charts/blittermib \
            --set image.tag=latest \
            --set httpRoute.enabled=true \
            --set 'httpRoute.parentRefs[0].name=dummy-gateway' \
            --set extraMibs.enabled=true \
            --set-string 'extraMibs.files.CI-SMOKE-MIB=ci smoke placeholder'

      - name: Wait for pod Ready
        run: kubectl rollout status deploy/blittermib --timeout=180s

      - name: Confirm the ConfigMap MIB mounted (subPath, not skipped symlink)
        run: |
          kubectl exec deploy/blittermib -- \
            test -f /var/lib/blittermib/mibs/extra/CI-SMOKE-MIB

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods,httproute -A
          kubectl describe deploy/blittermib || true
          kubectl logs deploy/blittermib --tail=50 || true
