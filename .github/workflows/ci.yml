name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsmi
        run: |
          sudo apt-get update
          sudo apt-get install -y libsmi2-dev smitools

      - name: Generate (templ)
        run: make generate

      - name: Verify
        run: make verify

      - name: Build
        run: make build

  cross-build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (templ)
        run: make generate

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: make build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Build Docker image
        run: make docker-build TAG=blittermib:ci

      - name: Smoke-test image tool surface
        run: make docker-smoke TAG=blittermib:ci

  # Lint + render the Helm chart, then install it on a throwaway kind
  # cluster (with the Gateway API CRDs applied) to exercise the
  # httpRoute path end-to-end and confirm the pod reaches Ready. helm
  # and kubectl are preinstalled on ubuntu-latest; kind and the CRDs are
  # fetched at pinned versions, so no new pinned action is introduced.
  chart:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Lint and template chart
        run: |
          make helm-lint
          make helm-template

      - name: Install kind
        run: |
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --wait 120s

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml

      - name: Build and load the PR image into kind
        # The chart and the binary move together (the chart's args
        # assume the <data>/mibs corpus default) — smoke against the
        # PR's own image, not a published tag.
        run: |
          make docker-build TAG=blittermib:ci
          kind load docker-image blittermib:ci

      - name: Install chart (httpRoute path)
        run: |
          helm install blittermib charts/blittermib \
            --set image.repository=blittermib \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set httpRoute.enabled=true \
            --set 'httpRoute.parentRefs[0].name=dummy-gateway'

      - name: Wait for pod Ready
        run: kubectl rollout status deploy/blittermib --timeout=180s

      - name: Standards served on first boot
        # Readiness implies boot finished (the listener starts after
        # the standard sync + validation), so a shipped standard
        # module must already be servable.
        run: |
          kubectl exec deploy/blittermib -- \
            wget -qO- http://127.0.0.1:8080/m/IF-MIB >/dev/null

      - name: Import-drop smoke (file into import/ becomes a served module)
        # kubectl cp needs tar INSIDE the container — alpine's busybox
        # provides it. The import/ tree exists before readiness (boot
        # ordering: EnsureDirs precedes the listener).
        run: |
          kubectl cp .github/ci-fixtures/CI-SMOKE-MIB \
            "$(kubectl get pod -l app.kubernetes.io/name=blittermib -o jsonpath='{.items[0].metadata.name}')":/var/lib/blittermib/data/mibs/import/CI-SMOKE-MIB
          for _ in $(seq 1 30); do
            if kubectl exec deploy/blittermib -- \
                 wget -qO- http://127.0.0.1:8080/m/CI-SMOKE-MIB >/dev/null 2>&1; then
              echo "imported and served"; exit 0
            fi
            sleep 2
          done
          echo "CI-SMOKE-MIB never became servable" >&2
          kubectl exec deploy/blittermib -- ls -R /var/lib/blittermib/data/mibs/import || true
          exit 1

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods,httproute -A
          kubectl describe deploy/blittermib || true
          kubectl logs deploy/blittermib --tail=50 || true
