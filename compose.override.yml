# compose.override.yml — self-host deployment overlay (mhuot fork).
#
# Auto-merged on top of compose.yml by `docker compose`. Kept separate
# so the upstream compose.yml stays untouched and fork syncs from
# no42-org/blittermib never conflict here.
#
# It puts blittermib behind the host's nginx-director reverse proxy:
# the proxy reaches the container by name over the shared external
# network, so no host port needs publishing.
services:
  blittermib:
    # Stable name nginx-director's upstream block proxies to.
    container_name: blittermib
    # Reached as http://blittermib:8080 on the proxy network; drop the
    # example's host port publish so nothing binds the host's :8080.
    ports: !reset []
    networks:
      - nginx-proxy-network
    # Relocate the import intake OFF the compose project dir. The base
    # compose binds ./import, but under CD the project dir is the
    # runner's git checkout — the container (root entrypoint) creates
    # import/{duplicate,failed,.tmp} owned by uid 1000 there, which then
    # breaks actions/checkout's `git clean`. Same target path overrides
    # the relative bind; drop MIBs into ~/blittermib-import on the host.
    volumes:
      - /home/ubuntu/blittermib-import:/var/lib/blittermib/data/mibs/import
    # Pin the secure posture explicitly. All three are off by default
    # in the app (fail-closed), but setting them false documents intent
    # and survives an accidental env_file that flips a default. This is
    # a public, unauthenticated instance: no write/active surfaces.
    #   - uploads  -> POST/DELETE /api/v1/upload (unauthenticated write)
    #   - walk     -> /walk* SNMP-output decoder (untrusted parse)
    #   - mcp      -> network MCP transport
    environment:
      BLITTERMIB_UPLOAD_ENABLED: "false"
      BLITTERMIB_WALK_DECODER_ENABLED: "false"
      BLITTERMIB_MCP_ENABLED: "false"
      # Raise the compile hang-backstop floor so very large single-file
      # MIBs can import (METASWITCH-MIB: ~92k objects, ~10 min in
      # smidump). Only raises the FLOOR — normal small MIBs still finish
      # in milliseconds; this just delays killing a genuinely-stuck one.
      BLITTERMIB_COMPILE_TIMEOUT: "20m"
    # Runtime hardening. The entrypoint starts as root only to repair
    # data-volume ownership, then drops to uid 1000 via su-exec, so it
    # needs exactly CHOWN + SETUID + SETGID (DAC_OVERRIDE/FOWNER cover
    # chowning root-owned files dropped into ./import). Everything else
    # is dropped. no-new-privileges blocks setuid-bit escalation.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true

networks:
  nginx-proxy-network:
    external: true
