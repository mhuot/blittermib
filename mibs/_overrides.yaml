# Sparse, hand-maintained companion to INDEX.yaml. Consulted by
# `make index` AFTER the auto-detector — any module name listed
# under `licenses:` overrides the detector's tag.
#
# Empty in v1.0 — add entries only when the auto-detector mis-tags
# a license, or when a MIB's header doesn't match any of the
# starter patterns and you want to ship a more accurate tag than
# `unknown`.
#
# License tags MUST appear in `mibs/LICENSES/`. Current values:
#   rfc-editor, unknown.
# When a vendor MIB drop returns, restore the matching pattern in
# `cmd/mib-index/license.go::licensePatterns` AND the matching
# `mibs/LICENSES/<tag>.txt` in the same change.
#
# Example (commented out):
#
# licenses:
#   WEIRD-VENDOR-MIB: rfc-editor
#   ANCIENT-RFC-MIB:  rfc-editor

licenses: {}
