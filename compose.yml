# compose.yml — example self-host configuration.
#
# The image already ships the curated corpus at
# /var/lib/blittermib/mibs (~322 standard IETF/IANA MIBs). Drop
# your own MIB files into ./mibs/upload on the host and they'll be
# layered on top via the bind-mount below — the watcher picks
# them up at runtime alongside the baked-in corpus. Read-only is
# fine; blittermib only reads from this directory. The data volume
# holds the SQLite database.
#
#   mkdir -p mibs/upload
#   docker compose up
#
# then open http://localhost:8080.

services:
  blittermib:
    image: ghcr.io/no42-org/blittermib:latest
    build:
      context: .
      args:
        VERSION: ${BLITTERMIB_VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./mibs/upload:/var/lib/blittermib/mibs/upload:ro
      - blittermib-data:/var/lib/blittermib/data
      # Operator-managed corpus (opt-in): replace the upload-only
      # mount above with a read-write mount of the WHOLE corpus to
      # run `blittermib-ingest` in the container — it MOVES files
      # from upload/ to vendors/{PEN}-{slug}/ etc., which needs rw
      # and a host-persisted tree. CAVEAT: this masks the corpus
      # baked into the image, so image upgrades no longer refresh
      # the standard MIBs — you own the tree from then on. Seed it
      # once before switching (the trailing /. copies the directory
      # CONTENTS — ./mibs already exists, plain cp would nest it):
      #   docker compose cp blittermib:/var/lib/blittermib/mibs/. ./mibs
      #   sudo chown -R 1000:1000 mibs
      # then REMOVE the upload-only line above and use this instead
      # (keeping both leaves upload/ read-only in the container and
      # blocks ingest moves):
      #   - ./mibs:/var/lib/blittermib/mibs
      # Runbook: README "Routing uploaded MIBs into the
      # corpus".
    restart: unless-stopped
    # blittermib drains in-flight requests for up to 30 s before
    # exiting (server.shutdown timeout). Set above the default 10 s
    # so Docker waits for graceful shutdown to complete instead of
    # SIGKILL'ing mid-drain.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  blittermib-data:
