# compose.yml — example self-host configuration.
#
# ONE data volume holds everything that matters: the curated corpus
# tree, the import/ intake, and the SQLite cache — they persist (and
# back up) as a unit. The image ships only the STANDARD corpus
# (~322 IETF/IANA MIBs) at a read-only path; at boot the server
# mirrors it into the corpus tree, so image upgrades refresh the
# standard set while your imported MIBs persist untouched.
#
# Importing MIBs: drop files into ./import on the host (bound into
# the intake below) or use the web upload. Valid files are compiled
# and filed into the curated tree automatically; failures land in
# ./import/failed/, duplicates in ./import/duplicate/, each with a
# JSON reason sidecar you can read right on the host.
#
#   mkdir -p import
#   docker compose up
#
# then open http://localhost:8080.

services:
  blittermib:
    image: ghcr.io/no42-org/blittermib:latest
    build:
      context: .
      args:
        VERSION: ${BLITTERMIB_VERSION:-dev}
    ports:
      - "8080:8080"
    volumes:
      - blittermib-data:/var/lib/blittermib/data
      # Host-visible intake: drop MIBs here, watch the quarantine
      # subfolders for outcomes. The bind sits inside the data
      # volume's corpus tree; imports cross the mount boundary via
      # the engine's copy fallback. Remove this line if you only
      # import through the web UI.
      - ./import:/var/lib/blittermib/data/mibs/import
    restart: unless-stopped
    # blittermib drains in-flight requests for up to 30 s before
    # exiting (server.shutdown timeout). Set above the default 10 s
    # so Docker waits for graceful shutdown to complete instead of
    # SIGKILL'ing mid-drain.
    stop_grace_period: 35s
    healthcheck:
      # /readyz, not /healthz: the readiness-gate change split the
      # health surface — /healthz is pure liveness (200 the moment the
      # process serves), /readyz means "initial corpus load completed
      # and the store answers", which is what this healthcheck
      # originally asserted. start_period covers typical cold-volume
      # loads; a very large corpus can take longer, in which case the
      # container shows `unhealthy` until the first load completes —
      # cosmetic only (Docker does not restart unhealthy containers,
      # and the load keeps making progress).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  blittermib-data:
